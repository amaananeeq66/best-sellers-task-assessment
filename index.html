<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Sellers</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Source Serif 4"', 'serif'],
                        condensed: ['"Bebas Neue"', 'sans-serif'],
                        body: ['Poppins', 'sans-serif']
                    }
                }
            }
        };
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Poppins:wght@400;500;600&amp;family=Source+Serif+4:wght@700;800&amp;display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#f7f4ef] font-body text-[#111111]">
    <main class="min-h-screen">
        <section class="min-h-screen px-6 pt-6 pb-6">

            <!-- Header -->
            <div class="mx-auto max-w-[1920px]">
                <header class="mb-5 flex items-center justify-center md:justify-between">
                    <h1
                        class="text-center font-display text-[34px] font-[900] leading-none tracking-[-0.03em] md:text-left md:text-[40px]">
                        Best Sellers
                    </h1>
                    <a href="#"
                        class="hidden md:inline-flex font-body text-[14px] font-semibold uppercase tracking-[0.14em] text-[#5b554e] gap-2">
                        <span>Shop All Best Sellers</span>
                        <span aria-hidden="true">&rarr;</span>
                    </a>
                </header>

                <!-- Mobile Products -->
                <div class="md:hidden">
                    <ul id="mobilePrimaryProducts" class="grid grid-cols-2 gap-3"></ul>
                    <div id="mobileMorePanel" class="mt-0 max-h-0 overflow-hidden opacity-0" aria-hidden="true">
                        <ul id="mobileMoreProducts" class="grid grid-cols-2 gap-3 pt-4"></ul>
                    </div>
                    <button id="showMoreBtn"
                        class="mt-5 w-full bg-[#1d1d1d] text-white px-5 py-3 rounded-full text-[12px] font-semibold">
                        Show More
                    </button>
                </div>

                <!-- Desktop Products -->
                <div class="hidden md:block">
                    <div id="desktopRail" class="overflow-x-auto flex gap-4 cursor-grab">
                        <ul id="desktopProducts" class="flex w-max gap-4 pb-5"></ul>
                    </div>
                    <div id="desktopScrollbar" class="relative mt-1 h-[2px] w-full rounded-full bg-[#d7d0ca]">
                        <button id="desktopThumb" type="button"
                            class="absolute left-0 top-1/2 h-[2px] -translate-y-1/2 rounded-full bg-[#111]"></button>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script>
        const products = [
            { id: 1, name: "OUTSIDE VIBES T-SHIRT SUNSHINE", price: 104.95, reviews: 1234, image: "", hoverImage: "", badges: ["BEST SELLER"], cardBgClass: "bg-[#f4cf2f]" },
            { id: 2, name: "NIKE BOTTLE OUTSIDE VIBES", price: 104.95, reviews: 1234, image: "", hoverImage: "", badges: ["BEST SELLER", "SAVE 10%"], cardBgClass: "bg-[#efefee]" },
            { id: 3, name: "REST IN NATURE T-SHIRT CHARCOAL", price: 104.95, reviews: 1234, image: "", hoverImage: "", badges: ["BEST SELLER"], cardBgClass: "bg-[#d6151d]" },
            { id: 4, name: "OUTSIDE VIBES CAP FOREST GREEN", price: 104.95, reviews: 1234, image: "", hoverImage: "", badges: ["BEST SELLER", "SAVE 10%"], cardBgClass: "bg-[#efb3bf]" },
            { id: 5, name: "REST IN NATURE T-SHIRT CHARCOAL", price: 104.95, reviews: 1234, image: "", hoverImage: "", badges: ["BEST SELLER"], cardBgClass: "bg-[#efb1ef]" }
        ];

        function renderStars() {
            return Array.from({ length: 5 }, () =>
                `<svg aria-hidden="true" viewBox="0 0 20 20" class="h-[12px] w-[12px] fill-[#111]">
                    <path d="M10 15.27 16.18 19l-1.64-7.03L20 7.24l-7.19-.62L10 0 7.19 6.62 0 7.24l5.46 4.73L3.82 19z"></path>
                </svg>`
            ).join("");
        }

        function renderBadge(badge) {
            const isSavings = badge.includes("SAVE");
            const badgeClass = isSavings ? "bg-[#6d8676] text-white border-black" : "bg-white text-[#111] border-black";
            return `<span class="inline-flex items-center rounded-full border px-[8px] font-condensed text-[10px] py-[4px] ${badgeClass}">${badge}</span>`;
        }

        function createCardMarkup(product, desktop) {
            return `
                <li class="${desktop ? "shrink-0" : "w-full"}">
                    <article class="group">
                        <a href="#" class="block" draggable="false">
                            <div class="relative mb-2 overflow-hidden rounded-[10px] ${product.cardBgClass}">
                                <div class="absolute inset-x-1.5 top-1.5 z-10 flex flex-wrap items-start justify-between gap-1">
                                    ${product.badges.map(renderBadge).join("")}
                                </div>
                                <div class="relative aspect-square overflow-hidden">
                                    <img src="${product.image}" alt="${product.name}" class="absolute inset-0 h-full w-full object-cover" />
                                    <img src="${product.hoverImage}" alt="${product.name}" class="absolute inset-0 h-full w-full object-cover opacity-0 group-hover:opacity-100" />
                                </div>
                            </div>
                            <div class="space-y-1 p-[8px] md:p-[12px]">
                                <h2 class="font-condensed text-[16px] md:text-[18px] leading-[0.95] tracking-[0.02em] text-[#1C1D1D]">
                                    ${product.name}
                                </h2>
                                <div class="flex items-center gap-1 text-[12px] text-[#9d9892]">
                                    <div class="flex items-center gap-[1px]">
                                        ${renderStars()}
                                    </div>
                                    <span class="font-body text-[11px] md:text-[12px]">${product.reviews.toLocaleString()} Reviews</span>
                                </div>
                                <p class="font-body text-[16px] font-medium text-[#1C1D1D]">$${product.price.toFixed(2)}</p>
                            </div>
                        </a>
                    </article>
                </li>
            `;
        }

        function renderProducts() {
            const desktopProducts = document.getElementById("desktopProducts");
            const mobilePrimaryProducts = document.getElementById("mobilePrimaryProducts");
            const mobileMoreProducts = document.getElementById("mobileMoreProducts");

            desktopProducts.innerHTML = products.map(product => createCardMarkup(product, true)).join("");
            mobilePrimaryProducts.innerHTML = products.slice(0, 4).map(product => createCardMarkup(product, false)).join("");
            mobileMoreProducts.innerHTML = products.slice(4).map(product => createCardMarkup(product, false)).join("");
        }

        renderProducts();

        // --- Mobile Show More / Show Less ---
        const showMoreBtn = document.getElementById("showMoreBtn");
        const mobileMorePanel = document.getElementById("mobileMorePanel");

        function setMobileExpanded(expanded) {
            showMoreBtn.textContent = expanded ? "Show Less" : "Show More";
            mobileMorePanel.setAttribute("aria-hidden", String(!expanded));

            if (expanded) {
                mobileMorePanel.classList.remove("mt-0", "max-h-0", "opacity-0");
                mobileMorePanel.classList.add("mt-4", "max-h-[1600px]", "opacity-100");
            } else {
                mobileMorePanel.classList.remove("mt-4", "max-h-[1600px]", "opacity-100");
                mobileMorePanel.classList.add("mt-0", "max-h-0", "opacity-0");
            }
        }

        showMoreBtn.addEventListener("click", () => {
            const expanded = showMoreBtn.textContent === "Show Less";
            setMobileExpanded(!expanded);
        });

        setMobileExpanded(false);
    </script>
</body>

</html>
