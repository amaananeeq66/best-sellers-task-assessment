<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Sellers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Source Serif 4"', 'serif'],
                        condensed: ['"Bebas Neue"', 'sans-serif'],
                        body: ['Poppins', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Poppins:wght@400;500;600&amp;family=Source+Serif+4:wght@700;800&amp;display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#f7f4ef] font-body text-[#111111] md:bg-[#1f1f1f] ">
    <main class="min-h-screen">
        <section class="min-h-screen bg-[#f7f4ef] px-0 pt-0 pb-6 md:min-h-0 md:pb-10 ">
            <div class="mx-auto w-full max-w-[1920px] px-6 pt-6 md:px-8 md:pt-8 lg:px-36">
                <header class="mb-5 flex items-center justify-center md:justify-between md:mb-7">
                    <h1
                        class="text-center font-display text-[34px] font-[900] leading-none tracking-[-0.03em] md:text-left md:text-[40px]">
                        Best
                        Sellers</h1>
                    <a href="#"
                        class="hidden items-center gap-2 font-body text-[14px] font-semibold uppercase tracking-[0.14em] text-[#5b554e] md:inline-flex">
                        <span>Shop All Best Sellers</span>
                        <span aria-hidden="true" class="text-sm">&rarr;</span>
                    </a>
                </header>



                <div class="md:hidden">
                    <ul id="mobilePrimaryProducts" class="grid grid-cols-2 gap-x-3 gap-y-4"
                        aria-label="Best selling products"></ul>
                    <div id="mobileMorePanel"
                        class="mt-0 max-h-0 overflow-hidden opacity-0 transition-all duration-500 ease-out"
                        aria-hidden="true">
                        <ul id="mobileMoreProducts" class="grid grid-cols-2 gap-x-3 gap-y-4 pt-4"
                            aria-label="More best selling products"></ul>
                    </div>
                    <button id="showMoreBtn" type="button"
                        class="mt-5 inline-flex w-full items-center justify-center rounded-full bg-[#1d1d1d] px-5 py-3 font-body text-[12px] font-semibold text-white transition hover:bg-black focus:outline-none focus:ring-2 focus:ring-black/20"
                        aria-controls="mobileMorePanel" aria-expanded="false">
                        Show More
                    </button>
                </div>
            </div>
            <div class="hidden w-full md:block md:pl-8 lg:pl-36 2xl:mx-auto 2xl:max-w-[1920px]">
                <div id="desktopRail"
                    class="overflow-x-auto overflow-y-hidden select-none cursor-grab active:cursor-grabbing [&::-webkit-scrollbar]:hidden [scrollbar-width:none] "
                    aria-label="Best selling products">
                    <ul id="desktopProducts"
                        class="flex w-max min-w-full gap-4 pb-5 after:content-[''] after:pl-[8rem] md:after:pl-[1rem] lg:after:pl-[8rem]">
                    </ul>
                </div>
            </div>
            <div class=" mx-auto hidden w-full max-w-[1920px] md:block md:px-8 lg:px-36">
                <div id="desktopScrollbar" class="group relative mt-1 h-[2px] w-full rounded-full bg-[#d7d0ca]">
                    <button id="desktopThumb" type="button"
                        class="absolute left-0 top-1/2 h-[2px] -translate-y-1/2 rounded-full bg-[#111111] transition-[height] duration-200 hover:h-[6px] group-hover:h-[6px] focus:h-[6px] active:h-[6px]"
                        aria-label="Drag to scroll products"></button>
                </div>
            </div>

        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
